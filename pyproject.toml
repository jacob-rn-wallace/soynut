[tool.ruff]
line-length = 100
target-version = "py39"
# NHD14432_POC/ is an explicitly preserved, untouched hardware-validated
# snapshot (CLAUDE.md's "Does NOT apply to" list) - its convert_images.py
# is a pre-Power-of-10 duplicate of NHD14432_DisplayBridge/'s copy (the
# one this project's own Power of 10 rewrite actually applies to), not
# code this project holds to this standard.
extend-exclude = ["Arduino NHD14432/NHD14432_POC"]

[tool.ruff.lint]
# Power of 10 (Python adaptation), Rule 10: static analysis with zero
# warnings. "ALL" plus a small, justified ignore list is more honest
# than the ruff default subset - anything ignored here should have a
# reason, not just be silently off.
select = ["ALL"]
ignore = [
    "D",       # docstrings - this project's convention is comments only
               # where the WHY isn't obvious, not module/function docstrings
    "ANN",     # missing type annotations - handled by mypy instead, not ruff
    "T201",    # `print` - these are CLI tools/scripts, print is the actual UI
    "COM812",  # trailing comma - formatting nit, not a correctness rule
    "S603",    # subprocess call check - flagged per-callsite instead where
               # this project genuinely shells out (arduino-cli, picotool)
    "FBT001",  # boolean positional arg - check()'s `condition` param (Power of
               # 10 Rule 5's non-strippable stand-in for `assert cond, msg`)
               # is deliberately positional to mirror `assert`'s own syntax
]

[tool.mypy]
python_version = "3.9"
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
exclude = [
    "^Arduino NHD14432/NHD14432_POC/",  # see [tool.ruff]'s extend-exclude comment above
    "^pico-sdk/",     # external dependency (gitignored, not project code) - not ours to hold to this
    "^toolchain/",    # extracted ARM toolchain (gitignored) - binary/support files, not Python we own
]
